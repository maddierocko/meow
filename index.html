<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Are the Cat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

:root {
  --bg: #0d0d0f;
  --bg2: #13131a;
  --bg3: #1a1a24;
  --border: #2a2a3a;
  --accent: #b48eff;
  --accent2: #ff6b6b;
  --accent3: #6bffb8;
  --text: #e8e8f0;
  --text-dim: #7070a0;
  --chaos: #ff4444;
  --suspicion: #ffaa00;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events:none;
  z-index:200;
}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glitch{0%,88%,100%{transform:translate(0);filter:none}90%{transform:translate(-2px,1px);filter:hue-rotate(80deg)}93%{transform:translate(2px,-1px);filter:hue-rotate(-80deg)}96%{transform:translate(0)}}
@keyframes tailwag-l{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
@keyframes tailwag-r{0%,100%{transform:rotate(7deg)}50%{transform:rotate(-9deg)}}
@keyframes float-l{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes float-r{0%,100%{transform:translateY(-2px)}50%{transform:translateY(3px)}}
@keyframes float-cat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse-chaos{0%,100%{box-shadow:0 0 0 rgba(255,68,68,0)}50%{box-shadow:0 0 16px rgba(255,68,68,0.3)}}
@keyframes screen-shake{0%,100%{transform:translate(0)}20%{transform:translate(-3px,1px)}40%{transform:translate(3px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(2px,-2px)}}
@keyframes void-pulse{0%,100%{filter:drop-shadow(0 0 6px #ff2a2a)}50%{filter:drop-shadow(0 0 16px #ff2a2a) drop-shadow(0 0 32px #ff000066)}}

.screen { display:none; width:100%; min-height:100vh; padding:20px; animation:fadeIn 0.3s ease; }
.screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; }

.wrap { width:100%; max-width:680px; }

/* ---- TITLE SCREEN ---- */
#title-screen { background: var(--bg); }

.title-art {
  text-align:center;
  margin-bottom:32px;
}

.title-main {
  font-family:'Press Start 2P', monospace;
  font-size:14px;
  color:var(--accent);
  text-shadow:0 0 24px rgba(180,142,255,0.6), 4px 4px 0 rgba(180,142,255,0.15);
  letter-spacing:3px;
  line-height:1.8;
  animation:glitch 9s infinite;
  display:block;
}

.title-sub {
  font-size:20px;
  color:var(--text-dim);
  letter-spacing:4px;
  margin-top:6px;
  display:block;
}

.title-cat {
  margin:30px auto;
  display:flex;
  justify-content:center;
}

.title-cat svg { animation:float-cat 3s ease-in-out infinite; }

.menu-btns {
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:8px;
}

.menu-btn {
  background:var(--bg2);
  border:2px solid var(--border);
  color:var(--text);
  font-family:'VT323', monospace;
  font-size:22px;
  padding:14px 20px;
  cursor:pointer;
  text-align:left;
  display:flex;
  align-items:center;
  gap:12px;
  transition:all 0.1s;
  letter-spacing:1px;
}

.menu-btn:hover { background:var(--bg3); border-color:var(--accent); color:var(--accent); }
.menu-btn .arrow { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--text-dim); }
.menu-btn:hover .arrow { color:var(--accent); }

/* ---- CAT SELECT ---- */
#cat-select { background:var(--bg); }

.screen-title {
  font-family:'Press Start 2P',monospace;
  font-size:10px;
  color:var(--accent);
  letter-spacing:2px;
  text-align:center;
  margin-bottom:6px;
  text-shadow:0 0 16px rgba(180,142,255,0.4);
}

.screen-sub {
  font-size:17px;
  color:var(--text-dim);
  text-align:center;
  letter-spacing:2px;
  margin-bottom:28px;
}

.cats-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}

.cat-tile {
  background:var(--bg2);
  border:2px solid var(--border);
  padding:14px 8px 12px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  transition:all 0.1s;
  position:relative;
}

.cat-tile:hover:not(.locked) { border-color:var(--accent); background:var(--bg3); }
.cat-tile.selected { border-color:var(--accent); background:#1a1428; }
.cat-tile.locked { opacity:0.4; cursor:default; }

.cat-tile-name {
  font-family:'Press Start 2P',monospace;
  font-size:5px;
  color:var(--text);
  text-align:center;
  line-height:1.8;
  letter-spacing:0.5px;
}

.cat-tile-hint {
  font-size:12px;
  color:var(--text-dim);
  text-align:center;
  line-height:1.3;
}

.lock-icon {
  position:absolute;
  top:5px;
  right:5px;
  font-family:'Press Start 2P',monospace;
  font-size:5px;
  color:var(--text-dim);
  background:var(--bg3);
  border:1px solid var(--border);
  padding:2px 4px;
}

.active-icon {
  position:absolute;
  top:5px;
  left:5px;
  font-family:'Press Start 2P',monospace;
  font-size:5px;
  color:var(--accent);
  background:rgba(180,142,255,0.15);
  border:1px solid var(--accent);
  padding:2px 4px;
  animation:blink 2s infinite;
}

.select-confirm {
  display:flex;
  gap:10px;
}

.btn-primary {
  flex:1;
  background:var(--accent);
  border:2px solid var(--accent);
  color:#0d0d0f;
  font-family:'VT323',monospace;
  font-size:20px;
  padding:12px 20px;
  cursor:pointer;
  font-weight:bold;
  letter-spacing:1px;
  transition:all 0.1s;
}

.btn-primary:hover { background:#c8a8ff; border-color:#c8a8ff; }

.btn-secondary {
  background:var(--bg2);
  border:2px solid var(--border);
  color:var(--text-dim);
  font-family:'VT323',monospace;
  font-size:20px;
  padding:12px 20px;
  cursor:pointer;
  letter-spacing:1px;
  transition:all 0.1s;
}

.btn-secondary:hover { border-color:var(--text-dim); color:var(--text); }

/* ---- GAME SCREEN ---- */
#game-screen { background:var(--bg); align-items:flex-start; padding-top:0; }

.game-wrap { width:100%; max-width:680px; padding:20px; }

.chapter-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  padding-bottom:12px;
  border-bottom:2px solid var(--border);
}

.chapter-name {
  font-family:'Press Start 2P',monospace;
  font-size:7px;
  color:var(--accent3);
  letter-spacing:1px;
}

.chapter-progress {
  font-family:'Press Start 2P',monospace;
  font-size:6px;
  color:var(--text-dim);
}

.meters {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}

.meter {
  background:var(--bg2);
  padding:8px 12px;
  border:2px solid var(--border);
}

.meter-label {
  font-family:'Press Start 2P',monospace;
  font-size:6px;
  letter-spacing:1px;
  margin-bottom:6px;
  display:flex;
  justify-content:space-between;
}

.meter-label.chaos { color:var(--chaos); }
.meter-label.susp { color:var(--suspicion); }

.meter-bar-bg {
  height:8px;
  background:var(--bg3);
  border:1px solid var(--border);
  overflow:hidden;
}

.meter-fill {
  height:100%;
  transition:width 0.4s ease;
}

.chaos-fill {
  background:repeating-linear-gradient(90deg,var(--chaos) 0,var(--chaos) 6px,#cc2222 6px,#cc2222 8px);
  box-shadow:0 0 6px rgba(255,68,68,0.4);
}

.susp-fill {
  background:repeating-linear-gradient(90deg,var(--suspicion) 0,var(--suspicion) 6px,#cc8800 6px,#cc8800 8px);
  box-shadow:0 0 6px rgba(255,170,0,0.4);
}

.scene-panel {
  background:var(--bg2);
  border:2px solid var(--border);
  margin-bottom:16px;
  overflow:hidden;
  animation:fadeIn 0.3s ease;
}

.scene-visual {
  height:170px;
  background:var(--bg3);
  border-bottom:2px solid var(--border);
  position:relative;
  overflow:hidden;
}

.scene-visual::after {
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:24px;
  background:repeating-linear-gradient(90deg,#1c1c28 0,#1c1c28 20px,#202030 20px,#202030 40px);
  border-top:2px solid #2a2a3a;
}

.scene-svg { position:absolute; bottom:24px; left:0; right:0; width:100%; height:calc(100% - 24px); }

.time-badge, .chapter-badge {
  position:absolute;
  font-family:'Press Start 2P',monospace;
  font-size:6px;
  background:var(--bg);
  border:1px solid var(--border);
  padding:3px 7px;
  z-index:10;
  top:8px;
}

.time-badge { left:8px; color:var(--accent3); }
.chapter-badge { right:8px; color:var(--text-dim); }

.narration {
  padding:18px 20px;
}

.narration-text {
  font-size:21px;
  line-height:1.6;
  color:var(--text);
  animation:slideIn 0.25s ease;
}

.narration-text .hl { color:var(--accent); }
.narration-text .danger { color:var(--accent2); }
.narration-text .good { color:var(--accent3); }

.cursor {
  display:inline-block;
  width:10px;height:18px;
  background:var(--text);
  vertical-align:middle;
  margin-left:3px;
  animation:blink 1s infinite;
}

.choices {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:16px;
}

.choice-btn {
  background:var(--bg2);
  border:2px solid var(--border);
  color:var(--text);
  font-family:'VT323',monospace;
  font-size:20px;
  padding:12px 16px;
  text-align:left;
  cursor:pointer;
  display:flex;
  align-items:flex-start;
  gap:10px;
  transition:all 0.1s;
  animation:fadeIn 0.3s ease;
  letter-spacing:0.5px;
}

.choice-btn:hover { background:var(--bg3); border-color:var(--accent); color:var(--accent); }
.choice-btn.chaos-choice:hover { border-color:var(--accent2); color:var(--accent2); }
.choice-btn.void-choice:hover { border-color:#ff2a2a; color:#ff2a2a; }

.choice-arrow { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--text-dim); margin-top:4px; flex-shrink:0; }
.choice-btn:hover .choice-arrow { color:inherit; }
.choice-text { flex:1; }

.choice-tag {
  font-family:'Press Start 2P',monospace;
  font-size:5px;
  padding:3px 5px;
  border:1px solid;
  align-self:center;
  flex-shrink:0;
}

.tag-neutral { color:var(--text-dim); border-color:var(--border); }
.tag-chaos { color:var(--chaos); border-color:var(--chaos); background:rgba(255,68,68,0.08); }
.tag-void { color:#ff2a2a; border-color:#ff2a2a; background:rgba(255,42,42,0.1); animation:blink 1.5s infinite; }
.tag-calm { color:var(--accent3); border-color:var(--accent3); background:rgba(107,255,184,0.08); }

.game-footer {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-top:10px;
  border-top:2px solid var(--border);
}

.footer-txt { font-family:'Press Start 2P',monospace; font-size:6px; color:var(--text-dim); }

.progress-dots { display:flex; gap:5px; align-items:center; }
.pdot { width:7px; height:7px; background:var(--border); border:1px solid var(--text-dim); }
.pdot.done { background:var(--accent); box-shadow:0 0 5px var(--accent); }
.pdot.cur { background:var(--accent2); box-shadow:0 0 5px var(--accent2); animation:blink 1s infinite; }

/* ---- ENDING SCREEN ---- */
#ending-screen { background:var(--bg); }

.ending-wrap {
  width:100%;
  max-width:600px;
  text-align:center;
}

.ending-chapter {
  font-family:'Press Start 2P',monospace;
  font-size:7px;
  color:var(--text-dim);
  letter-spacing:2px;
  margin-bottom:12px;
}

.ending-title {
  font-family:'Press Start 2P',monospace;
  font-size:18px;
  line-height:1.8;
  margin-bottom:20px;
  animation:glitch 6s infinite;
}

.ending-cat { margin:20px auto; display:flex; justify-content:center; }

.ending-meters {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:20px 0;
  text-align:left;
}

.ending-text {
  font-size:22px;
  color:var(--text-dim);
  line-height:1.7;
  margin-bottom:28px;
  padding:0 10px;
}

.ending-secret {
  background:#120020;
  border:2px solid #440044;
  padding:16px;
  margin-bottom:20px;
  font-family:'Press Start 2P',monospace;
  font-size:7px;
  color:#cc44ff;
  line-height:2;
  animation:blink 3s infinite;
}

.ending-btns { display:flex; flex-direction:column; gap:10px; }

/* ---- RUN HISTORY ---- */
#history-screen { background:var(--bg); }

.history-list {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:20px;
  max-height:60vh;
  overflow-y:auto;
}

.history-item {
  background:var(--bg2);
  border:2px solid var(--border);
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.history-ending { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--accent); line-height:1.8; }
.history-cat { font-size:16px; color:var(--text-dim); }
.history-date { font-family:'Press Start 2P',monospace; font-size:5px; color:var(--text-dim); text-align:right; line-height:2; }

/* tail animations in game */
.gtail-l { transform-origin:4px 0; animation:tailwag-l 1.4s ease-in-out infinite; }
.gtail-r { transform-origin:4px 0; animation:tailwag-r 1.6s ease-in-out infinite 0.3s; }
.gfloat-l { animation:float-l 2.8s ease-in-out infinite; }
.gfloat-r { animation:float-r 3.1s ease-in-out infinite 0.5s; }
.gfloat { animation:float-cat 3s ease-in-out infinite; }
.void-cat-anim { animation:float-cat 3s ease-in-out infinite, void-pulse 2.5s ease-in-out infinite; }

</style>
</head>
<body>

<!-- ============================================================ -->
<!-- TITLE SCREEN                                                  -->
<!-- ============================================================ -->
<div id="title-screen" class="screen active">
  <div class="wrap">
    <div class="title-art">
      <span class="title-main">YOU ARE THE CAT</span>
      <span class="title-sub">A GAME OF CONSEQUENCE</span>
    </div>

    <div class="title-cat" id="title-cat-display">
      <!-- rendered by JS -->
    </div>

    <div class="menu-btns">
      <button class="menu-btn" onclick="showScreen('cat-select')">
        <span class="arrow">▶</span> NEW GAME
      </button>
      <button class="menu-btn" id="continue-btn" onclick="continueGame()" style="display:none">
        <span class="arrow">▶</span> CONTINUE
      </button>
      <button class="menu-btn" onclick="showScreen('history-screen')">
        <span class="arrow">▶</span> RUN HISTORY
      </button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- CAT SELECT                                                    -->
<!-- ============================================================ -->
<div id="cat-select" class="screen">
  <div class="wrap">
    <div class="screen-title">CHOOSE YOUR CAT</div>
    <div class="screen-sub">EACH CAT. DIFFERENT NARRATION. SAME CHAOS.</div>

    <div class="cats-grid" id="cats-grid">
      <!-- rendered by JS -->
    </div>

    <div class="select-confirm">
      <button class="btn-primary" onclick="startGame()">BEGIN</button>
      <button class="btn-secondary" onclick="showScreen('title-screen')">BACK</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- GAME SCREEN                                                   -->
<!-- ============================================================ -->
<div id="game-screen" class="screen">
  <div class="game-wrap">
    <div class="chapter-bar">
      <div class="chapter-name" id="chapter-name">CHAPTER 1: KITCHEN</div>
      <div class="chapter-progress" id="chapter-progress">DECISION 1 OF 7</div>
    </div>

    <div class="meters">
      <div class="meter">
        <div class="meter-label chaos">
          <span>CHAOS</span><span id="chaos-val">0%</span>
        </div>
        <div class="meter-bar-bg"><div class="meter-fill chaos-fill" id="chaos-bar" style="width:0%"></div></div>
      </div>
      <div class="meter">
        <div class="meter-label susp">
          <span>SUSPICION</span><span id="susp-val">0%</span>
        </div>
        <div class="meter-bar-bg"><div class="meter-fill susp-fill" id="susp-bar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="scene-panel">
      <div class="scene-visual">
        <div class="time-badge" id="time-badge">8:12 AM</div>
        <div class="chapter-badge" id="chapter-badge">CH.1</div>
        <svg class="scene-svg" id="scene-svg" viewBox="0 0 680 146" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
          <!-- rendered by JS -->
        </svg>
      </div>
      <div class="narration">
        <div class="narration-text" id="narration-text"></div>
      </div>
    </div>

    <div class="choices" id="choices"></div>

    <div class="game-footer">
      <div class="footer-txt" id="footer-left">DECISION 1</div>
      <div class="progress-dots" id="progress-dots"></div>
      <div class="footer-txt">YOU ARE THE CAT</div>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- ENDING SCREEN                                                 -->
<!-- ============================================================ -->
<div id="ending-screen" class="screen">
  <div class="ending-wrap">
    <div class="ending-chapter" id="ending-chapter">RUN COMPLETE</div>
    <div class="ending-title" id="ending-title"></div>

    <div class="ending-cat" id="ending-cat-display"></div>

    <div class="ending-meters">
      <div class="meter">
        <div class="meter-label chaos"><span>FINAL CHAOS</span><span id="end-chaos-val">0%</span></div>
        <div class="meter-bar-bg"><div class="meter-fill chaos-fill" id="end-chaos-bar" style="width:0%"></div></div>
      </div>
      <div class="meter">
        <div class="meter-label susp"><span>FINAL SUSPICION</span><span id="end-susp-val">0%</span></div>
        <div class="meter-bar-bg"><div class="meter-fill susp-fill" id="end-susp-bar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="ending-text" id="ending-text"></div>
    <div class="ending-secret" id="ending-secret" style="display:none"></div>

    <div class="ending-btns">
      <button class="menu-btn" onclick="startNewRun()"><span class="arrow">▶</span> PLAY AGAIN</button>
      <button class="menu-btn" onclick="showScreen('cat-select')"><span class="arrow">▶</span> CHANGE CAT</button>
      <button class="menu-btn" onclick="showScreen('title-screen')"><span class="arrow">▶</span> MAIN MENU</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- HISTORY SCREEN                                                -->
<!-- ============================================================ -->
<div id="history-screen" class="screen">
  <div class="wrap">
    <div class="screen-title">RUN HISTORY</div>
    <div class="screen-sub">YOUR LAST 10 DESCENTS INTO CHAOS</div>
    <div class="history-list" id="history-list"></div>
    <button class="btn-secondary" style="width:100%" onclick="showScreen('title-screen')">BACK</button>
  </div>
</div>

<script>

'use strict';

// ============================================================
// STATE
// ============================================================
let G = {
  catId: 'gray_tabby',
  chaos: 0,
  suspicion: 0,
  chapterIndex: 0,
  decisionIndex: 0,
  choiceHistory: [],
  runChoicePool: []   // per-run randomised choice pools for replayability
};

let selectedCat = 'gray_tabby';

// ============================================================
// CAT DEFINITIONS
// ============================================================
const CATS = {
  gray_tabby: {
    id:'gray_tabby', name:'GRAY TABBY',
    tagline:'Dry. Unbothered. Has been here before.',
    unlockHint:'DEFAULT — ALWAYS UNLOCKED',
    unlocked: true,
    eyeColor:'#b48eff', eyeLight:'#d4b8ff',
    bodyColor:'#a8a8c0', bodyDark:'#505068', bodyLight:'#c8c8dc',
    pointColor:'#505068', earInner:'#d4829a',
    hasStripes:true, isTuxedo:false, isSisters:false, isVoid:false
  },
  orange_tabby: {
    id:'orange_tabby', name:'ORANGE TABBY',
    tagline:'Loud. Certain. Wrong but committed.',
    unlockHint:'FINISH ANY RUN',
    unlocked: false,
    eyeColor:'#40cc60', eyeLight:'#80ee90',
    bodyColor:'#e8841a', bodyDark:'#a05010', bodyLight:'#f09840',
    pointColor:'#c06010', earInner:'#d4829a',
    hasStripes:true, isTuxedo:false, isSisters:false, isVoid:false
  },
  black_cat: {
    id:'black_cat', name:'BLACK CAT',
    tagline:'No remorse. Not even a little.',

// ============================================================
// CHOICE TAG RULES — enforced in code, not just data
// tag:'calm'    => chaos <= 0, susp <= 0  (at least one negative)
// tag:'neutral' => chaos = 0, susp = 0   (strictly zero)
// tag:'chaos'   => chaos > 0 OR susp > 0
// tag:'void'    => chaos > 0, secret ending trigger
// makeChoice clamps to these rules before applying.
// ============================================================
function applyChoice(choice) {
  let dc = choice.chaos;
  let ds = choice.susp;
  // Enforce tag contract
  if (choice.tag === 'neutral') { dc = 0; ds = 0; }
  if (choice.tag === 'calm') {
    dc = Math.min(0, dc);
    ds = Math.min(0, ds);
    if (dc === 0 && ds === 0) { dc = -4; ds = -3; } // floor: always reduce something
  }
  G.chaos     = Math.max(0, Math.min(100, G.chaos     + dc));
  G.suspicion = Math.max(0, Math.min(100, G.suspicion + ds));
}

function getEnding(chaos, suspicion, choices) {
  const hasSecret1 = choices.includes('string_follow') && choices.includes('place_sit');
  const hasSecret2 = choices.includes('othercat_interrogate') && choices.includes('far_follow') && choices.includes('place_together');
  const hasSecret3 = choices.includes('treats_drag') && choices.includes('sound_release') && choices.includes('closet_release');
  const calmCount  = choices.filter(k => ['drip_drink','drip_sleep','trash_leave','trash_sniff','treats_resist','treats_two','bird_ignore','bird_sleep','fridge_ignore','sun_lie','sun_sleep','bed_center','bed_foot','laundry_sleep','laundry_beside','under_leave','under_look','glass_drink','glass_resist','string_leave','closet_close','closet_guard','final_innocent','final_groom','outside_door','othercat_wait','buried_cover','buried_leave','neighbor_leave','neighbor_exit','far_return','far_escort','place_return','void_home','void_slow'].includes(k)).length;
  const hasSecret4 = calmCount >= 8 && suspicion <= 15;

  if (hasSecret2) return {title:'THE AGREEMENT', color:'#6bffb8', isSecret:true, secretLabel:'SECRET ENDING UNLOCKED: THE AGREEMENT', secretKey:'agreement', text:'You and the other cat reached an understanding somewhere between the third block and the void. The terms were not written down. They did not need to be. The human found you both on the porch at dusk. Neither of you has spoken of it since.'};
  if (chaos >= 85 && choices.includes('void_notyet')) return {title:'FULL VOID', color:'#ff2a2a', isSecret:true, secretLabel:'SECRET ENDING UNLOCKED: FULL VOID', secretKey:'full_void', text:'You went somewhere that does not have a name. The other cat tried to follow and stopped. The human called your name until they lost their voice. You came back three days later and have not explained yourself. You will not explain yourself.'};
  if (hasSecret3) return {title:'THE LONG CON', color:'#b48eff', isSecret:true, secretLabel:'SECRET ENDING UNLOCKED: THE LONG CON', secretKey:'long_con', text:'Chaos at maximum. Suspicion at zero. The human came home and found the house in a condition that defies casual explanation. They sat down. They looked at you. You looked back. They have never been less sure of anything in their life. You have never been more sure.'};
  if (hasSecret4) return {title:'WITNESSED', color:'#ffaa00', isSecret:true, secretLabel:'SECRET ENDING UNLOCKED: WITNESSED', secretKey:'witnessed', text:'You did almost nothing. And yet the neighbor called. And yet the other cat left a mark on the fence. And yet the human found something under the bed they cannot account for. You were present for all of it. That is all you will say.'};
  if (chaos >= 80) return {title: G.catId==='void_cat' ? 'MAXIMUM ENTROPY' : 'CLASSIC MENACE', color:'#ff4444', text:'The human came home to a house that had, in their absence, become a different house. They stood in the doorway for a long time. You sat in the center of the room and looked at them. This is the natural order. They will adapt.'};
  if (chaos >= 60 && suspicion >= 50) return {title:'CAUGHT RED-HANDED', color:'#ff6b6b', text:'The evidence was circumstantial but overwhelming. The human connected the events in the correct sequence. You did not attempt to deny it. Denial would have been insulting to both of you. They know. You know they know.'};
  if (chaos >= 60 && suspicion < 30) return {title:'THE PROFESSIONAL', color:'#b48eff', text:'Significant damage was done. No one can prove anything. The human suspects. You maintain composure. This is not your first operation and it will not be your last.'};
  if (chaos >= 40) return {title:'A PRODUCTIVE DAY', color:'#ffaa00', text:'Things happened. Some of them were your fault. The human came home to minor evidence of a life lived fully and without apology. They sighed. You blinked slowly. Everyone moved on.'};
  if (chaos >= 20) return {title:'SUSPICIOUS BUT FINE', color:'#6bffb8', text:'You showed restraint. Relative restraint. The house is mostly intact. The human came home and found you in the sun spot and briefly forgot to check the kitchen. This was the plan all along.'};
  return {title:'SOMEHOW FINE', color:'#c8c8c8', text:'You spent the day in quiet contemplation. The house is undisturbed. The human came home and said "good cat" and you accepted this with the knowledge that they have no idea what you were thinking about all day. No idea at all.'};
}

// ============================================================
// SAVE / LOAD
// ============================================================
function saveGame() { try { localStorage.setItem('yatc_state', JSON.stringify(G)); } catch(e){} }
function loadGame() { try { const s=localStorage.getItem('yatc_state'); if(s){G=JSON.parse(s);return true;} } catch(e){} return false; }
function saveHistory(ending) {
  try {
    let h = JSON.parse(localStorage.getItem('yatc_history')||'[]');
    h.unshift({ending:ending.title, cat:CATS[G.catId].name, chaos:G.chaos, suspicion:G.suspicion, date:new Date().toLocaleDateString(), isSecret:!!ending.isSecret});
    if(h.length>10) h=h.slice(0,10);
    localStorage.setItem('yatc_history', JSON.stringify(h));
  } catch(e){}
}
function getUnlocks() { try{return JSON.parse(localStorage.getItem('yatc_unlocks')||'{}');}catch(e){return{};} }
function saveUnlock(catId) { try{const u=getUnlocks();u[catId]=true;localStorage.setItem('yatc_unlocks',JSON.stringify(u));}catch(e){} }
function getSecrets() { try{return JSON.parse(localStorage.getItem('yatc_secrets')||'[]');}catch(e){return[];} }
function saveSecret(key) { try{const s=getSecrets();if(!s.includes(key)){s.push(key);localStorage.setItem('yatc_secrets',JSON.stringify(s));}}catch(e){} }

// ============================================================
// UNLOCK LOGIC — called at end of run with final state
// ============================================================
function processUnlocks(ending) {
  // Always unlock orange for finishing any run
  saveUnlock('orange_tabby');

  // Black cat: final chaos >= 80
  if (G.chaos >= 80) saveUnlock('black_cat');

  // Tuxedo: final suspicion < 20
  if (G.suspicion < 20) saveUnlock('tuxedo');

  // Tortoiseshell: completed all 4 chapters — endGame only fires after all chapters done
  saveUnlock('tortoiseshell');

  // Sisters: at end of chapter 3 (decisions 14-27), suspicion < 30
  // We track ch3Suspicion in G
  if (typeof G.ch3Suspicion !== 'undefined' && G.ch3Suspicion < 30) saveUnlock('sisters');

  // Calico: any secret ending
  if (ending.isSecret) {
    saveUnlock('calico');
    saveSecret(ending.secretKey);
    if (getSecrets().length >= 4) saveUnlock('void_cat');
  }
}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id==='title-screen') renderTitleCat();
  if (id==='cat-select')   renderCatSelect();
  if (id==='history-screen') renderHistory();
}

// ============================================================
// TITLE
// ============================================================
function renderTitleCat() {
  const el = document.getElementById('title-cat-display');
  const unlocks = getUnlocks();
  const available = CAT_ORDER.filter(id => CATS[id].unlocked || unlocks[id]);
  const id = available[Math.floor(Math.random()*available.length)];
  const cat = CATS[id];
  const w = cat.isSisters ? 200 : cat.isVoid ? 130 : 110;
  const h = cat.isVoid ? 148 : 130;
  el.innerHTML = renderCatSVG(id, w, h, true);
  document.getElementById('continue-btn').style.display = localStorage.getItem('yatc_state') ? 'flex' : 'none';
}

// ============================================================
// CAT SELECT
// ============================================================
function renderCatSelect() {
  const unlocks = getUnlocks();
  const secrets  = getSecrets();
  CAT_ORDER.forEach(id => { if(unlocks[id]) CATS[id].unlocked=true; });
  if (secrets.length>=4) CATS.void_cat.unlocked=true;

  const grid = document.getElementById('cats-grid');
  grid.innerHTML = CAT_ORDER.map(id => {
    const cat = CATS[id];
    const unlocked = cat.unlocked;
    const sel = selectedCat===id;
    const cw = cat.isSisters ? 86 : 58;
    const ch = cat.isVoid ? 68 : 62;
    return `<div class="cat-tile ${unlocked?'':'locked'} ${sel?'selected':''}" onclick="${unlocked?`selectCat('${id}')`:``}">
      ${sel?'<div class="active-icon">ON</div>':''}
      ${!unlocked?'<div class="lock-icon">LOCK</div>':''}
      <div style="width:${cw}px;height:${ch}px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden">
        ${renderCatSVG(id,cw,ch,false)}
      </div>
      <div class="cat-tile-name">${cat.name}</div>
      <div class="cat-tile-hint">${unlocked?cat.tagline:cat.unlockHint}</div>
    </div>`;
  }).join('');
}

function selectCat(id) { selectedCat=id; renderCatSelect(); }

// ============================================================
// CHOICE POOL — pick 3 random choices from pool each run
// stored in G.runChoicePool per [chapterIdx][decisionIdx]
// ============================================================
function buildChoicePool() {
  G.runChoicePool = CHAPTERS.map(ch =>
    ch.decisions.map(d => {
      // Shuffle pool, always include at least one chaos and one calm/neutral if available
      const chaos  = d.pool.filter(c=>c.tag==='chaos'||c.tag==='void');
      const calm   = d.pool.filter(c=>c.tag==='calm');
      const neutral= d.pool.filter(c=>c.tag==='neutral');
      const rest   = d.pool.filter(c=>c.tag!=='chaos'&&c.tag!=='void'&&c.tag!=='calm'&&c.tag!=='neutral');

      // guaranteed 1 chaos + 1 calm/neutral, then 1 random from remainder
      const pick = [];
      if (chaos.length)   pick.push(chaos[Math.floor(Math.random()*chaos.length)]);
      const softPool = [...calm, ...neutral];
      if (softPool.length) pick.push(softPool[Math.floor(Math.random()*softPool.length)]);
      // fill to 3 from remaining pool
      const usedKeys = new Set(pick.map(c=>c.key));
      const remaining = d.pool.filter(c=>!usedKeys.has(c.key));
      shuffle(remaining);
      while(pick.length<3 && remaining.length) pick.push(remaining.pop());
      shuffle(pick);
      return pick;
    })
  );
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

// ============================================================
// GAME START
// ============================================================
function startGame() {
  G = {
    catId: selectedCat,
    chaos: 0,
    suspicion: 0,
    chapterIndex: 0,
    decisionIndex: 0,
    choiceHistory: [],
    runChoicePool: [],
    ch3Suspicion: undefined
  };
  buildChoicePool();
  localStorage.removeItem('yatc_state');
  showScreen('game-screen');
  renderDecision();
}

function continueGame() {
  if(loadGame()){ showScreen('game-screen'); renderDecision(); }
}

function startNewRun() { showScreen('cat-select'); }

// ============================================================
// RENDER DECISION
// ============================================================
function renderDecision() {
  const chapter  = CHAPTERS[G.chapterIndex];
  const decision = chapter.decisions[G.decisionIndex];
  const choices  = G.runChoicePool[G.chapterIndex]?.[G.decisionIndex] || decision.pool.slice(0,3);

  // header
  document.getElementById('chapter-name').textContent = chapter.name;
  document.getElementById('chapter-progress').textContent = `DECISION ${G.decisionIndex+1} OF ${chapter.decisions.length}`;

  // meters
  const cv = Math.min(100, G.chaos);
  const sv = Math.min(100, G.suspicion);
  document.getElementById('chaos-bar').style.width = cv+'%';
  document.getElementById('chaos-val').textContent  = cv+'%';
  document.getElementById('susp-bar').style.width  = sv+'%';
  document.getElementById('susp-val').textContent   = sv+'%';
  document.getElementById('chaos-bar').style.animation = cv>=60 ? 'pulse-chaos 1s infinite' : '';

  // badges
  document.getElementById('time-badge').textContent    = chapter.times[G.decisionIndex]||'';
  document.getElementById('chapter-badge').textContent = chapter.badge;

  // scene
  const bg = SCENES[decision.sceneKey] || SCENES.kitchen_counter;
  document.getElementById('scene-svg').innerHTML = bg + renderSceneCat();

  // narration
  let narration = decision.narration;
  if (G.catId==='sisters' && Math.random()>0.55) {
    const adds = ['The other one disagrees.','Neither of us planned this.','We have discussed this.','The other one is watching.','One of us is lying.'];
    narration += ` <span class="hl">${adds[Math.floor(Math.random()*adds.length)]}</span>`;
  }
  document.getElementById('narration-text').innerHTML = narration + '<span class="cursor"></span>';

  // choices
  document.getElementById('choices').innerHTML = choices.map((c,i)=>{
    let tag='';
    if      (c.tag==='chaos')   tag='<span class="choice-tag tag-chaos">+CHAOS</span>';
    else if (c.tag==='void')    tag='<span class="choice-tag tag-void">???</span>';
    else if (c.tag==='calm')    tag='<span class="choice-tag tag-calm">GOOD CAT</span>';
    else                        tag='<span class="choice-tag tag-neutral">NEUTRAL</span>';
    const cls = c.tag==='chaos'?'chaos-choice':c.tag==='void'?'void-choice':'';
    return `<button class="choice-btn ${cls}" onclick="makeChoice(${i})">
      <span class="choice-arrow">▶</span>
      <span class="choice-text">${c.text}</span>
      ${tag}
    </button>`;
  }).join('');

  // progress dots
  document.getElementById('progress-dots').innerHTML = Array.from({length:chapter.decisions.length},(_,i)=>{
    let cl='pdot'; if(i<G.decisionIndex)cl+=' done'; else if(i===G.decisionIndex)cl+=' cur';
    return `<div class="${cl}"></div>`;
  }).join('');

  document.getElementById('footer-left').textContent = `CHAPTER ${G.chapterIndex+1} OF 4`;
  saveGame();
}

function renderSceneCat() {
  const cat = CATS[G.catId];
  const w = cat.isSisters ? 200 : cat.isVoid ? 130 : 110;
  const h = cat.isVoid ? 148 : 120;
  const x = 340 - w/2;
  return `<g transform="translate(${x}, 8)">${renderCatSVG(G.catId, w, h, true)}</g>`;
}

// ============================================================
// MAKE CHOICE
// ============================================================
function makeChoice(index) {
  const chapter  = CHAPTERS[G.chapterIndex];
  const decision = chapter.decisions[G.decisionIndex];
  const choices  = G.runChoicePool[G.chapterIndex]?.[G.decisionIndex] || decision.pool.slice(0,3);
  const choice   = choices[index];

  applyChoice(choice);  // enforces tag contract before applying
  G.choiceHistory.push(choice.key);

  // screen shake on high chaos
  if (G.chaos >= 75) {
    const gw = document.querySelector('.game-wrap');
    gw.style.animation = 'screen-shake 0.3s ease';
    setTimeout(()=>{ gw.style.animation=''; }, 320);
  }

  G.decisionIndex++;

  // end of chapter 3 — snapshot suspicion for sisters unlock
  if (G.chapterIndex === 2 && G.decisionIndex >= chapter.decisions.length) {
    G.ch3Suspicion = G.suspicion;
    console.log('CH3 suspicion snapshot:', G.ch3Suspicion);
  }

  if (G.decisionIndex >= chapter.decisions.length) {
    G.chapterIndex++;
    G.decisionIndex = 0;
    if (G.chapterIndex >= CHAPTERS.length) { endGame(); return; }
  }

  renderDecision();
}

// ============================================================
// END GAME
// ============================================================
function endGame() {
  const ending = getEnding(G.chaos, G.suspicion, G.choiceHistory);
  processUnlocks(ending);
  saveHistory(ending);
  localStorage.removeItem('yatc_state');

  document.getElementById('ending-title').textContent   = ending.title;
  document.getElementById('ending-title').style.color   = ending.color;
  document.getElementById('ending-chapter').textContent = `CHAOS: ${G.chaos}%  /  SUSPICION: ${G.suspicion}%`;

  const cat = CATS[G.catId];
  const ew  = cat.isSisters ? 200 : cat.isVoid ? 130 : 110;
  const eh  = cat.isVoid ? 148 : 130;
  document.getElementById('ending-cat-display').innerHTML = renderCatSVG(G.catId, ew, eh, true);

  document.getElementById('end-chaos-bar').style.width  = G.chaos+'%';
  document.getElementById('end-chaos-val').textContent   = G.chaos+'%';
  document.getElementById('end-susp-bar').style.width   = G.suspicion+'%';
  document.getElementById('end-susp-val').textContent    = G.suspicion+'%';

  document.getElementById('ending-text').textContent = ending.text;

  const sec = document.getElementById('ending-secret');
  if (ending.isSecret) {
    sec.style.display='block';
    sec.textContent = '★ '+ending.secretLabel+' ★';
  } else {
    sec.style.display='none';
  }

  showScreen('ending-screen');
}

// ============================================================
// HISTORY
// ============================================================
function renderHistory() {
  const list = document.getElementById('history-list');
  try {
    const h = JSON.parse(localStorage.getItem('yatc_history')||'[]');
    if (!h.length) { list.innerHTML='<div style="font-size:18px;color:var(--text-dim);padding:20px;text-align:center;">No runs yet. The cat has not yet decided to act.</div>'; return; }
    list.innerHTML = h.map(r=>`<div class="history-item">
      <div>
        <div class="history-ending" style="${r.isSecret?'color:#cc44ff':''}">${r.ending}</div>
        <div class="history-cat">${r.cat}</div>
      </div>
      <div class="history-date">CHAOS ${r.chaos}%<br/>SUSP ${r.suspicion}%<br/>${r.date}</div>
    </div>`).join('');
  } catch(e) { list.innerHTML='<div style="color:var(--text-dim);padding:20px;">No history found.</div>'; }
}

// ============================================================
// INIT
// ============================================================
window.onload = () => {
  const unlocks = getUnlocks();
  CAT_ORDER.forEach(id=>{ if(unlocks[id]) CATS[id].unlocked=true; });
  if (getSecrets().length>=4) CATS.void_cat.unlocked=true;
  renderTitleCat();
};
